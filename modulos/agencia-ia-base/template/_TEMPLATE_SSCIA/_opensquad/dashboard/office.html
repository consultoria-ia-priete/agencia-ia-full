<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cockpit — Lançamento Imobiliário</title>
<style>
  :root {
    /* DARK MODE — ferramenta interna da agência.
       Brand-kit oficial: verde #8FDF65 sobre preto. NUNCA fundo branco. */
    --bg: #FAF8F4;
    --panel: #FFFFFF;
    --panel-2: #FBF9F5;
    --border: #E8E3DA;
    --border-strong: #CFC4B2;
    --text: #1A1A1A;
    --text-2: #5A5550;
    --muted: #8C857A;
    --brand: #4E8A33;        /* verde — cor primária da agência */
    --brand-2: #4E8A33;      /* mantido verde p/ coerência (acentos do escritório) */
    --accent: #B8954A;       /* badges de roster */
    --green: #2E9E5B;
    --green-bg: rgba(46,158,91,.12);
    --yellow: #B8902A;
    --yellow-bg: rgba(184,144,42,.14);
    --red: #C0492E;
    --red-bg: rgba(192,73,46,.10);
    --total-bg: #F2EEE7;     /* faixa de subtotal "▸ TOTAL TESTE N" */
    --grand-bg: #EAF3E4;     /* verde profundo — faixa "— TOTAL GERAL" */
    --row-hover: #F6F2EB;
    --shadow: 0 1px 3px rgba(40,33,20,.06), 0 8px 24px rgba(40,33,20,.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px; line-height: 1.55; min-height: 100vh;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 22px 26px 120px; }

  /* HEADER */
  header.top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px; padding: 16px 20px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow);
  }
  header.top h1 { font-size: 19px; margin: 0; letter-spacing: -0.01em; display: flex; align-items: center; gap: 9px; }
  header.top h1 .sub { color: var(--muted); font-weight: 400; font-size: 14px; }
  header.top .right { display: flex; gap: 14px; align-items: center; font-size: 13px; color: var(--muted); }
  header.top .clock { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--brand-2); font-size: 14px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; box-shadow: 0 0 6px var(--green); animation: pulse 1.7s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .back-link, .nav-link {
    color: var(--text-2); text-decoration: none; font-size: 13px;
    padding: 7px 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel-2);
    cursor: pointer;
  }
  .back-link:hover, .nav-link:hover { border-color: var(--brand); color: var(--brand); }

  /* ── NÍVEL 1 — MULTI-CLIENTE ─────────────────────────────── */
  .level-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 4px 0 14px; }
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .client-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 0; overflow: hidden; cursor: pointer; transition: transform .14s, box-shadow .14s;
    box-shadow: var(--shadow);
  }
  .client-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.6); border-color: var(--brand); }
  .client-card .cc-top { height: 6px; background: var(--brand); }
  .client-card .cc-body { padding: 16px 18px 18px; }
  .client-card h3 { margin: 0 0 2px; font-size: 18px; letter-spacing: -0.01em; color: var(--text); }
  .client-card .cc-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .client-card .cc-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cc-kpi { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; }
  .cc-kpi .v { font-size: 18px; font-weight: 700; line-height: 1.1; color: var(--text); }
  .cc-kpi .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; }
  .cc-quality { margin-top: 11px; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .cc-quality.green { background: var(--green-bg); color: var(--green); }
  .cc-quality.yellow { background: var(--yellow-bg); color: var(--yellow); }
  .cc-quality.red { background: var(--red-bg); color: var(--red); }
  .cc-quality.neutral { background: var(--panel-2); color: var(--muted); }
  .cc-alert { margin-top: 9px; font-size: 12px; color: var(--red); display: flex; gap: 6px; align-items: flex-start; line-height: 1.4; }
  .cc-open { margin-top: 13px; font-size: 13px; font-weight: 600; color: var(--brand); }

  /* ── NÍVEL 2 — CLIENTE ───────────────────────────────────── */
  #clientView { display: none; }
  .client-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; margin-bottom: 18px; box-shadow: var(--shadow);
    border-left: 5px solid var(--brand);
  }
  .client-head h2 { margin: 0; font-size: 24px; letter-spacing: -0.015em; color: var(--text); }
  .client-head .ch-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* KPI strip */
  .kpi-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 18px; }
  @media (max-width: 860px) { .kpi-strip { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 15px 17px; box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .kpi::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--brand); }
  .kpi.is-green::before { background: var(--green); }
  .kpi.is-yellow::before { background: var(--yellow); }
  .kpi.is-red::before { background: var(--red); }
  .kpi .kv { font-size: 25px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
  .kpi.is-green .kv { color: var(--green); }
  .kpi.is-yellow .kv { color: var(--yellow); }
  .kpi.is-red .kv { color: var(--red); }
  .kpi .kl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

  /* Alertas */
  .alerts { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
  .alert {
    border-radius: 12px; padding: 14px 17px; display: flex; gap: 11px;
    align-items: flex-start; font-size: 14px; line-height: 1.5;
  }
  .alert .ic { font-size: 19px; line-height: 1.2; flex-shrink: 0; }
  .alert.critico {
    background: var(--red-bg); border: 1px solid rgba(255,90,77,.5);
    color: #ffb3ad; font-weight: 600;
    box-shadow: 0 0 0 3px rgba(255,59,59,.1);
  }
  .alert.atencao { background: var(--yellow-bg); border: 1px solid rgba(240,192,64,.4); color: #f3d98a; }
  .alert .nivel-tag {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
    padding: 2px 8px; border-radius: 999px; align-self: flex-start; margin-top: 1px;
  }
  .alert.critico .nivel-tag { background: var(--red); color: #000; }
  .alert.atencao .nivel-tag { background: var(--yellow); color: #000; }

  /* Tabelas */
  .table-block {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 20px; overflow: hidden; box-shadow: var(--shadow);
  }
  .table-block .tb-head {
    padding: 14px 19px; background: var(--panel-2); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .table-block .tb-head h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; color: var(--text); }
  .tb-scope {
    font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .02em;
    background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px;
    white-space: nowrap;
  }
  .table-scroll { overflow-x: auto; }
  table.data { width: 100%; border-collapse: collapse; font-size: 15px; min-width: 620px; }
  table.data th, table.data td { padding: 10px 13px; text-align: right; white-space: nowrap; }
  table.data th:first-child, table.data td:first-child { text-align: left; }
  table.data thead th {
    background: var(--panel-2); color: var(--text-2); font-size: 12px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 700;
    border-bottom: 2px solid var(--border-strong);
  }
  table.data tbody td { border-bottom: 1px solid var(--border); color: var(--text); }
  table.data tbody tr:hover td { background: var(--row-hover); }
  table.data tr.subtotal td {
    font-weight: 700; background: var(--total-bg); color: var(--text);
    border-top: 1px solid var(--border-strong); border-bottom: 1px solid var(--border-strong);
  }
  table.data tr.subtotal:hover td { background: var(--total-bg); }
  table.data tr.grandtotal td {
    font-weight: 800; background: var(--grand-bg); color: var(--brand);
    border-top: 2px solid var(--brand); border-bottom: none;
  }
  table.data tr.grandtotal:hover td { background: var(--grand-bg); }
  table.data tr.grandtotal td.dim { color: var(--text-2); }
  table.data tr.grandtotal td .q-pill { color: var(--brand); background: rgba(143,223,101,.2); }
  .group-label { color: var(--muted); font-size: 12px; }
  td.dim { color: var(--muted); }
  .q-pill {
    display: inline-block; min-width: 44px; padding: 3px 9px; border-radius: 999px;
    font-weight: 700; font-size: 13px; text-align: center;
  }
  .q-pill.green { background: var(--green-bg); color: var(--green); }
  .q-pill.yellow { background: var(--yellow-bg); color: var(--yellow); }
  .q-pill.red { background: var(--red-bg); color: var(--red); }
  .q-pill.neutral { background: var(--panel-2); color: var(--muted); }
  .medal { font-size: 16px; margin-right: 4px; }
  .tb-note { padding: 10px 19px; font-size: 12px; color: var(--muted); background: var(--panel-2); border-top: 1px solid var(--border); font-style: italic; }
  .row-note { font-size: 11px; color: var(--muted); font-style: italic; }
  .status-chip {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    padding: 2px 8px; border-radius: 999px;
  }
  .status-chip.ativo { background: var(--green-bg); color: var(--green); }
  .status-chip.pausado { background: var(--panel-2); color: var(--muted); }

  /* ── SELETOR DE DATAS (filtra só a Timeline diária) ───────── */
  .date-filter {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .date-filter .df-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .05em; font-weight: 600; margin-right: 2px;
  }
  .day-chip {
    font-size: 13px; font-weight: 600; cursor: pointer; user-select: none;
    padding: 5px 11px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text-2);
    transition: background .12s, border-color .12s, color .12s;
  }
  .day-chip:hover { border-color: var(--brand); color: var(--text); }
  .day-chip.active {
    background: var(--brand); border-color: var(--brand); color: #000;
  }
  .day-chip.df-all {
    border-style: dashed;
  }
  .day-chip.df-all.active { border-style: solid; }

  /* ── ESCRITÓRIO VIRTUAL (seção final) ─────────────────────── */
  .office-section { margin-top: 30px; }
  .office-section .os-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .office-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 1080px) { .office-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px) { .office-grid { grid-template-columns: 1fr; } }
  .room { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; box-shadow: var(--shadow); }
  .room-header { padding: 11px 15px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .room-header h4 { margin: 0; font-size: 14px; display: flex; align-items: center; gap: 7px; color: var(--text); }
  .room-header .codename { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--brand); padding: 2px 7px; background: rgba(143,223,101,.12); border-radius: 4px; }
  .room-header .roster-badge { font-size: 10px; color: var(--accent); padding: 2px 6px; background: rgba(143,223,101,.1); border-radius: 999px; margin-left: 3px; }
  .room-header .status-light { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .light-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.7s infinite; }
  .room-body { padding: 12px 14px 14px; }
  .room-task { font-size: 12px; color: var(--text-2); padding: 7px 11px; background: rgba(143,223,101,.07); border-left: 2px solid var(--brand-2); border-radius: 4px; margin-bottom: 11px; }
  .room-task .task-prefix { color: var(--brand-2); font-weight: 600; font-family: ui-monospace, monospace; font-size: 11px; }
  .agent-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
  .agent-chip {
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: var(--panel-2); position: relative;
  }
  .agent-chip .ac-code { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; color: var(--brand); letter-spacing: .04em; }
  .agent-chip .ac-role { font-size: 11px; color: var(--text-2); margin-top: 3px; line-height: 1.35; }
  .agent-chip .ac-dot { position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
  .agent-chip.working .ac-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .agent-overflow {
    grid-column: 1 / -1; text-align: center; padding: 10px;
    border: 1px dashed var(--accent); border-radius: 8px; background: rgba(143,223,101,.05);
    font-size: 12px; color: var(--accent); font-weight: 600;
  }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty code { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--text-2); }
</style>
</head>
<body>
<div class="wrap">

<header class="top">
  <div>
    <h1>🏗️ Cockpit <span class="sub" id="headSub">— Lançamento Imobiliário</span></h1>
  </div>
  <div class="right">
    <span class="live-dot"></span> live
    <span class="clock" id="clock">--:--:--</span>
    <a href="../../../_AGENCY/_opensquad/dashboard/index.html" class="back-link">← Hub MESTRE 👑</a>
  </div>
</header>

<!-- NÍVEL 1 — MULTI-CLIENTE -->
<div id="clientsView">
  <div class="level-title">Clientes · categoria lançamento-imobiliário</div>
  <div class="clients-grid" id="clientsGrid"></div>
</div>

<!-- NÍVEL 2 — CLIENTE -->
<div id="clientView"></div>

<script>
// ============= AGENT DATA =============
// Bloco populado por build-office.py (auto-discovery de clientes da categoria).
// No template fica vazio — cada cliente que herda esta pasta gera o seu rodando o build.
const cockpitData = {
  "categoria": "lancamento-imobiliario",
  "current_slug": "",
  "clients": []
};

// ============= CHARACTER RENDER =============
// ───────── Helpers de formatação ─────────
const DASH = '—';
function fmtBRL(v) {
  if (v === null || v === undefined) return DASH;
  return 'R$' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtNum(v) {
  if (v === null || v === undefined) return DASH;
  return Number(v).toLocaleString('pt-BR');
}
function fmtPct(v) {
  if (v === null || v === undefined) return DASH;
  return v + '%';
}
function fmtCell(v) {
  if (v === null || v === undefined) return DASH;
  return fmtNum(v);
}
function qualityClass(pct) {
  if (pct === null || pct === undefined) return 'neutral';
  if (pct >= 30) return 'green';
  if (pct >= 18) return 'yellow';
  return 'red';
}
function qPill(pct) {
  return `<span class="q-pill ${qualityClass(pct)}">${fmtPct(pct)}</span>`;
}
// Rótulo de escopo p/ tabelas que SEMPRE mostram o acumulado do período
// (Por Campanha e Ranking não têm granularidade diária no readout).
function scopePill(c) {
  const per = c.periodo || {};
  if (!per.inicio) return '';
  const ini = per.inicio.slice(5).replace('-', '/');
  const fim = (per.fim || '').slice(5).replace('-', '/');
  return `<span class="tb-scope">acumulado ${ini}–${fim}${per.fim_parcial ? ' (parcial)' : ''}</span>`;
}

// ───────── NÍVEL 1 — cards de cliente ─────────
function renderClientsView() {
  const grid = document.getElementById('clientsGrid');
  const clients = cockpitData.clients || [];
  if (!clients.length) {
    grid.innerHTML = `<div class="empty">Nenhum cliente da categoria <b>lançamento-imobiliário</b> encontrado.<br>
      Rode <code>build-office.py</code> após gerar o <code>readout-imobiliario.json</code>.</div>`;
    return;
  }
  grid.innerHTML = clients.map(c => {
    const k = c.kpis || {};
    const critico = (c.alertas || []).find(a => a.nivel === 'critico');
    const alertHtml = critico
      ? `<div class="cc-alert"><span>${critico.icone || '🚨'}</span><span>${critico.texto}</span></div>`
      : '';
    return `
      <div class="client-card" data-slug="${c.slug}"
           style="--brand:#4E8A33;--brand-2:#4E8A33;
  }).join('');

  grid.querySelectorAll('.client-card').forEach(card => {
    card.addEventListener('click', () => openClient(card.dataset.slug));
  });
}

// ───────── NÍVEL 2 — visão do cliente ─────────
function kpiCardClass(metric, value) {
  // % ≥R$4k é o único com semáforo direto; demais ficam neutros (cor de marca)
  if (metric === 'qualidade') return ' is-' + qualityClass(value);
  return '';
}

function renderKpiStrip(c) {
  const k = c.kpis || {};
  const items = [
    { v: fmtBRL(k.gasto), l: 'Gasto total', cls: '' },
    { v: fmtNum(k.leads), l: 'Leads (CRM Funnels)', cls: '' },
    { v: fmtBRL(k.cpl), l: 'CPL médio', cls: '' },
    { v: (k.ctr!=null? k.ctr+'%' : DASH), l: 'CTR', cls: '' },
    { v: fmtPct(k.pct_qualidade), l: '% ≥' + c.faixa_qualidade_min, cls: kpiCardClass('qualidade', k.pct_qualidade) },
  ];
  return `<div class="kpi-strip">${items.map(i => `
    <div class="kpi${i.cls}"><div class="kv">${i.v}</div><div class="kl">${i.l}</div></div>`).join('')}</div>`;
}

function renderAlerts(c) {
  const alertas = c.alertas || [];
  if (!alertas.length) return '';
  // crítico primeiro
  const ordered = [...alertas].sort((a,b) => (a.nivel==='critico'?0:1) - (b.nivel==='critico'?0:1));
  return `<div class="alerts">${ordered.map(a => `
    <div class="alert ${a.nivel==='critico'?'critico':'atencao'}">
      <span class="ic">${a.icone || (a.nivel==='critico'?'🚨':'⚠️')}</span>
      <span class="nivel-tag">${a.nivel}</span>
      <span>${a.texto}</span>
    </div>`).join('')}</div>`;
}

// Estado do filtro de datas (dia selecionado p/ a Timeline; null = todos)
let timelineFilterDay = null;

// Recalcula o TOTAL da Timeline a partir dos dias visíveis no filtro.
function computeTimelineTotal(days) {
  if (!days.length) {
    return { gasto: null, leads: null, brackets: [null,null,null,null], pct_qualidade: null };
  }
  let gasto = 0, leads = 0;
  const b = [0,0,0,0];
  let hasBrackets = false;
  days.forEach(d => {
    gasto += Number(d.gasto || 0);
    leads += Number(d.leads || 0);
    const db = d.brackets || [];
    if (db.some(v => v !== null && v !== undefined)) {
      hasBrackets = true;
      for (let i = 0; i < 4; i++) b[i] += Number(db[i] || 0);
    }
  });
  // pct_qualidade = leads nas faixas ≥ faixa de qualidade / total de leads classificados
  const classified = b[0] + b[1] + b[2] + b[3];
  const quality = b[2] + b[3]; // faixas a partir de faixa_qualidade_min (4-6k, >6k)
  const pct = (hasBrackets && classified > 0)
    ? Math.round((quality / classified) * 100) : null;
  return {
    gasto,
    leads,
    brackets: hasBrackets ? b : [null,null,null,null],
    pct_qualidade: pct,
  };
}

// Re-renderiza só a tabela da Timeline conforme o filtro ativo.
function refreshTimeline(c) {
  const block = document.getElementById('timelineBlock');
  if (block) block.outerHTML = renderTimeline(c);
  bindTimelineFilter(c);
}

function bindTimelineFilter(c) {
  document.querySelectorAll('#timelineBlock .day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const day = chip.dataset.day || null;
      timelineFilterDay = (day === '__all__') ? null : day;
      refreshTimeline(c);
    });
  });
}

// Tabela 1 — Timeline diária (com seletor de datas)
function renderTimeline(c) {
  const fr = c.faixas_renda || [];
  const allDays = c.timeline || [];
  // valida o filtro: se o dia some do readout, volta p/ "todos"
  if (timelineFilterDay && !allDays.some(d => d.dia === timelineFilterDay)) {
    timelineFilterDay = null;
  }
  const days = timelineFilterDay
    ? allDays.filter(d => d.dia === timelineFilterDay)
    : allDays;

  const rows = days.map(d => {
    const b = d.brackets || [null,null,null,null];
    const obs = d.obs ? ` <span class="row-note">(${d.obs})</span>` : '';
    return `<tr>
      <td>${d.dia}${obs}</td>
      <td>${fmtBRL(d.gasto)}</td>
      <td>${fmtCell(d.leads)}</td>
      <td class="dim">${fmtCell(b[0])}</td>
      <td class="dim">${fmtCell(b[1])}</td>
      <td class="dim">${fmtCell(b[2])}</td>
      <td class="dim">${fmtCell(b[3])}</td>
      <td>${qPill(d.pct_qualidade)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="8" class="dim" style="text-align:center;padding:18px;">Nenhum dia no intervalo.</td></tr>`;

  // TOTAL recalculado a partir do que está visível
  const t = computeTimelineTotal(days);
  const tb = t.brackets || [null,null,null,null];
  const totalLabel = timelineFilterDay ? 'TOTAL (dia filtrado)' : 'TOTAL';
  const totalRow = `<tr class="grandtotal">
      <td>${totalLabel}</td>
      <td>${fmtBRL(t.gasto)}</td>
      <td>${fmtCell(t.leads)}</td>
      <td class="dim">${fmtCell(tb[0])}</td>
      <td class="dim">${fmtCell(tb[1])}</td>
      <td class="dim">${fmtCell(tb[2])}</td>
      <td class="dim">${fmtCell(tb[3])}</td>
      <td>${qPill(t.pct_qualidade)}</td>
    </tr>`;

  // Chips: "Todos" + um por dia disponível
  const allActive = timelineFilterDay ? '' : ' active';
  const chips = `<span class="day-chip df-all${allActive}" data-day="__all__">Todos (${allDays.length}d)</span>`
    + allDays.map(d => {
        const active = (timelineFilterDay === d.dia) ? ' active' : '';
        const label = d.dia.slice(8,10) + '/' + d.dia.slice(5,7);
        return `<span class="day-chip${active}" data-day="${d.dia}">${label}</span>`;
      }).join('');

  return `
  <div class="table-block" id="timelineBlock">
    <div class="tb-head">
      <h3>📅 Timeline diária</h3>
      <div class="date-filter">
        <span class="df-label">Filtrar dia</span>
        ${chips}
      </div>
    </div>
    <div class="table-scroll">
      <table class="data">
        <thead><tr>
          <th>Dia</th><th>Gasto Meta</th><th>Leads (CRM Funnels)</th>
          <th>${fr[0]||'<2k'}</th><th>${fr[1]||'2-4k'}</th>
          <th>${fr[2]||'4-6k'}</th><th>${fr[3]||'>6k'}</th>
          <th>% ≥${c.faixa_qualidade_min}</th>
        </tr></thead>
        <tbody>${rows}${totalRow}</tbody>
      </table>
    </div>
  </div>`;
}

// Tabela 2 — Por campanha, agrupada por teste
function renderCampaigns(c) {
  const campanhas = c.campanhas || [];
  const testes = c.testes || [];
  const testeById = {};
  testes.forEach(t => { testeById[t.teste] = t; });

  // ordem dos grupos = ordem em que cada teste aparece nas campanhas
  const order = [];
  campanhas.forEach(camp => { if (!order.includes(camp.teste)) order.push(camp.teste); });

  let body = '';
  order.forEach(tid => {
    const grupo = campanhas.filter(camp => camp.teste === tid);
    grupo.forEach(camp => {
      const b = camp.brackets || [null,null,null,null];
      body += `<tr>
        <td>${camp.nome}</td>
        <td>${fmtBRL(camp.gasto)}</td>
        <td>${fmtCell(camp.impressoes)}</td>
        <td>${fmtCell(camp.cliques)}</td>
        <td>${camp.ctr!=null?camp.ctr+'%':DASH}</td>
        <td>${fmtCell(camp.leads)}</td>
        <td>${fmtBRL(camp.cpl)}</td>
        <td class="dim">${fmtCell(b[0])}</td>
        <td class="dim">${fmtCell(b[1])}</td>
        <td class="dim">${fmtCell(b[2])}</td>
        <td class="dim">${fmtCell(b[3])}</td>
      </tr>`;
    });
    const t = testeById[tid];
    if (t) {
      const tb = t.brackets || [null,null,null,null];
      body += `<tr class="subtotal">
        <td>▸ TOTAL TESTE ${tid} <span class="group-label">${t.nome||''}</span></td>
        <td>${fmtBRL(t.gasto)}</td>
        <td>${fmtCell(t.impressoes)}</td>
        <td>${fmtCell(t.cliques)}</td>
        <td>${t.ctr!=null?t.ctr+'%':DASH}</td>
        <td>${fmtCell(t.leads)}</td>
        <td>${fmtBRL(t.cpl)}</td>
        <td>${fmtCell(tb[0])}</td>
        <td>${fmtCell(tb[1])}</td>
        <td>${fmtCell(tb[2])}</td>
        <td>${fmtCell(tb[3])}</td>
      </tr>`;
    }
  });

  const tt = c.testes_total || {};
  const ttb = tt.brackets || [null,null,null,null];
  body += `<tr class="grandtotal">
    <td>— TOTAL GERAL</td>
    <td>${fmtBRL(tt.gasto)}</td>
    <td>${fmtCell(tt.impressoes)}</td>
    <td>${fmtCell(tt.cliques)}</td>
    <td>${tt.ctr!=null?tt.ctr+'%':DASH}</td>
    <td>${fmtCell(tt.leads)}</td>
    <td>${fmtBRL(tt.cpl)}</td>
    <td>${fmtCell(ttb[0])}</td>
    <td>${fmtCell(ttb[1])}</td>
    <td>${fmtCell(ttb[2])}</td>
    <td>${fmtCell(ttb[3])}</td>
  </tr>`;

  const fr = c.faixas_renda || [];
  return `
  <div class="table-block">
    <div class="tb-head">
      <h3>📊 Por campanha · subtotal por teste</h3>
      ${scopePill(c)}
    </div>
    <div class="table-scroll">
      <table class="data" style="min-width:880px">
        <thead><tr>
          <th>Campanha</th><th>Gasto</th><th>Impr</th><th>Cliq</th><th>CTR</th>
          <th>Leads</th><th>CPL</th>
          <th>${fr[0]||'<2k'}</th><th>${fr[1]||'2-4k'}</th>
          <th>${fr[2]||'4-6k'}</th><th>${fr[3]||'>6k'}</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  </div>`;
}

// Tabela 3 — Ranking dos testes
function renderRanking(c) {
  const testes = c.testes || [];
  const testeById = {};
  testes.forEach(t => { testeById[t.teste] = t; });
  const ranking = c.ranking || [];
  let hasObs = false;

  const rows = ranking.map(r => {
    const t = testeById[r.teste] || {};
    if (t.obs) hasObs = true;
    const b = t.brackets || [null,null,null,null];
    const statusChip = t.status
      ? ` <span class="status-chip ${t.status}">${t.status}</span>` : '';
    return `<tr>
      <td><span class="medal">${r.medalha||''}</span>Teste ${r.teste} · ${t.nome||''}${statusChip}
        ${r.destaque?`<div class="row-note">${r.destaque}</div>`:''}</td>
      <td>${fmtBRL(t.gasto)}</td>
      <td>${fmtCell(t.leads)}</td>
      <td>${fmtBRL(t.cpl)}</td>
      <td>${t.ctr!=null?t.ctr+'%':DASH}</td>
      <td>${qPill(t.pct_qualidade)}</td>
      <td>${fmtCell(t.leads_topo)}</td>
    </tr>`;
  }).join('');

  const note = hasObs
    ? `<div class="tb-note">${ranking.map(r => {
        const t = testeById[r.teste] || {};
        return t.obs ? `Teste ${r.teste}: ${t.obs}` : '';
      }).filter(Boolean).join(' · ')}</div>`
    : '';

  const fr = c.faixas_renda || [];
  return `
  <div class="table-block">
    <div class="tb-head">
      <h3>🎯 Ranking dos Testes</h3>
      ${scopePill(c)}
    </div>
    <div class="table-scroll">
      <table class="data">
        <thead><tr>
          <th>Teste</th><th>Gasto</th><th>Leads</th><th>CPL</th><th>CTR</th>
          <th>% ≥${c.faixa_qualidade_min}</th><th>Leads ${fr[3]||'>6k'}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${note}
  </div>`;
}

// Escritório virtual (seção final)
function renderOffice(c) {
  const squads = c.squads || [];
  if (!squads.length) return '';
  const rooms = squads.map(sq => {
    const agentChips = sq.agents.map(a => `
      <div class="agent-chip ${a.working?'working':''}" title="${a.tip||''}">
        <span class="ac-dot"></span>
        <div class="ac-code">${a.code}</div>
        <div class="ac-role">${a.role}</div>
      </div>`).join('');
    const overflow = sq.overflow
      ? `<div class="agent-overflow">+${sq.overflow} lendários no roster</div>` : '';
    const rosterBadge = sq.overflow
      ? `<span class="roster-badge">${sq.totalAgents} no roster</span>` : '';
    return `
      <div class="room">
        <div class="room-header">
          <h4>${sq.emoji} ${sq.name} <span class="codename">${sq.codename}</span>${rosterBadge}</h4>
          <div class="status-light"><span class="light-dot"></span> ativo</div>
        </div>
        <div class="room-body">
          <div class="room-task"><span class="task-prefix">EXEC ›</span> ${sq.task}</div>
          <div class="agent-list">${agentChips}${overflow}</div>
        </div>
      </div>`;
  }).join('');
  return `
  <div class="office-section">
    <div class="os-title">🏢 Escritório virtual · ${c.total_agents} agentes em ${c.total_squads} squads</div>
    <div class="office-grid">${rooms}</div>
  </div>`;
}

function renderClientView(c) {
  const view = document.getElementById('clientView');
  view.style.setProperty('--brand', c.colors.primary);
  view.style.setProperty('--brand-2', c.colors.secondary);
  view.style.setProperty('--accent', c.colors.accent || '#B99362');
  const per = c.periodo || {};
  const periodoTxt = per.inicio
    ? `${per.inicio} → ${per.fim}${per.fim_parcial?' (parcial)':''}` : '';
  view.innerHTML = `
    <div class="client-head">
      <div>
        <h2>${c.nome}</h2>
        <div class="ch-meta">${c.meta_account||''} · ${periodoTxt} · atualizado ${(c.atualizado_em||'').slice(0,16).replace('T',' ')}</div>
      </div>
      <a class="nav-link" id="backToList">← Todos os clientes</a>
    </div>
    ${renderKpiStrip(c)}
    ${renderAlerts(c)}
    ${renderTimeline(c)}
    ${renderCampaigns(c)}
    ${renderRanking(c)}
    ${renderOffice(c)}
  `;
  document.getElementById('backToList').addEventListener('click', closeClient);
  bindTimelineFilter(c);
}

function openClient(slug) {
  const c = (cockpitData.clients || []).find(x => x.slug === slug);
  if (!c) return;
  timelineFilterDay = null; // sempre abre mostrando todos os dias
  renderClientView(c);
  document.getElementById('clientsView').style.display = 'none';
  document.getElementById('clientView').style.display = 'block';
  document.getElementById('headSub').textContent = '— ' + c.nome;
  window.scrollTo(0, 0);
}
function closeClient() {
  document.getElementById('clientView').style.display = 'none';
  document.getElementById('clientsView').style.display = 'block';
  document.getElementById('headSub').textContent = '— Lançamento Imobiliário';
  window.scrollTo(0, 0);
}

// ───────── Boot ─────────
function boot() {
  renderClientsView();
  const clients = cockpitData.clients || [];
  // Abre direto o cliente atual quando há só 1, ou o current_slug
  if (clients.length === 1) {
    openClient(clients[0].slug);
  } else if (cockpitData.current_slug) {
    // mantém na lista, mas cliente atual já está em destaque (primeiro)
  }
}
boot();

// ============= CLOCK =============
function tickClock() {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
}
tickClock(); setInterval(tickClock, 1000);

// ============= AGENT WORK FLICKER =============
setInterval(() => {
  const view = document.getElementById('clientView');
  if (view.style.display !== 'block') return;
  document.querySelectorAll('.agent-chip').forEach(chip => {
    if (Math.random() < 0.12) chip.classList.toggle('working');
  });
}, 4000);
</script>
